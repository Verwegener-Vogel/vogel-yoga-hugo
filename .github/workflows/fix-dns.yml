name: Fix Cloudflare DNS
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  fix_dns:
    runs-on: ubuntu-latest
    steps:
      - name: Update Cloudflare DNS Record
        env:
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
        run: |
          # 1. Find any existing 'verein' records
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE/dns_records?name=verein.vogel.yoga" 
               -H "Authorization: Bearer $CLOUDFLARE_TOKEN" 
               -H "Content-Type: application/json" 
               | jq -r '.result[0].id // empty')

          # 2. Delete it if it exists to avoid conflicts
          if [ -n "$RECORD_ID" ]; then
            echo "Deleting existing record $RECORD_ID"
            curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE/dns_records/$RECORD_ID" 
                 -H "Authorization: Bearer $CLOUDFLARE_TOKEN" 
                 -H "Content-Type: application/json"
          fi

          # 3. Create the correct CNAME record with Proxied=false (Grey Cloud)
          echo "Creating new CNAME record for verein"
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE/dns_records" 
               -H "Authorization: Bearer $CLOUDFLARE_TOKEN" 
               -H "Content-Type: application/json" 
               --data '{"type":"CNAME","name":"verein","content":"verwegener-vogel.github.io","proxied":false,"ttl":1}'
