     Its content will appear before the closing </head>-tag -->

<!-- Custom CSS via inline styles
     You may use this template to add custom CSS to your site like so: -->

<style>
     #site-head {
          position: relative;
          display: table;
          width: 100%;
          height: 100%;
          margin-bottom: 0rem;
          text-align: center;
          color: #fff;
          --cover-title-text-shadow: none; /* Removed shadow, using frosted glass background instead */
          background: #017d1d no-repeat center center;
          background-size: cover;
     }

     /* Smart Design Element: Glassmorphism / Frosted Glass for text readability */
     #site-head-content {
          opacity: 0; /* Hidden initially per user request */
          transform: translateY(15px);
          transition: opacity 1.5s ease-out, transform 1.5s ease-out;
          
          /* Elegant Frosted Glass Effect */
          background-color: rgba(1, 125, 29, 0.25) !important; /* Theme green with high transparency */
          backdrop-filter: blur(8px);
          -webkit-backdrop-filter: blur(8px);
          border: 1px solid rgba(255, 255, 255, 0.15);
          box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
          border-radius: 16px;
          padding: 2.5rem 2rem !important; /* Add some padding so content breathes within glass */
     }

     /* The class triggered by Javascript to reveal the text */
     #site-head-content.is-revealed {
          opacity: 1;
          transform: translateY(0);
     }


     /* Links */
     a:hover {
          color: #b6b84c;
     }

     /* Header Buttons on Startpage */
     a.btn {
          color: white;
          background-color: #ced067;
     }

     a.btn:hover {
          background-color: #b6b84c;
     }

     /* Scroll Menu on Startpage */
     a.fn-item.active {
          color: #b6b84c;
     }

     a.fn-item:hover {
          color: #ced067;
     }

     /* Content / Sections */
     .post-holder.dark {
          background: #017d1d;
          color: white;
     }

     .post-holder {
          background: #f2efe8;
     }

     body {
          color: #3A4145;
     }

     /* Footer */
     .site-footer {
          color: #BBC7CC;
          background-color: #22343A;
     }
</style>
